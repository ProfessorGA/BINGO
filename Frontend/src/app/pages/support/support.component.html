<div class="page-container animate-fade-in">
  <div class="container">
    <h1 class="gradient-text page-title">Support & Contact</h1>
    <p class="page-subtitle">Let's work together. Fill out the form below to get in touch!</p>

    <div class="glass-panel form-container">
      <form [formGroup]="supportForm" (ngSubmit)="onSubmit()">
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" formControlName="firstName" class="glass-input" placeholder="Enter first name">
            <div class="error-text" *ngIf="supportForm.get('firstName')?.invalid && supportForm.get('firstName')?.touched">First name is required.</div>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" formControlName="lastName" class="glass-input" placeholder="Enter last name">
            <div class="error-text" *ngIf="supportForm.get('lastName')?.invalid && supportForm.get('lastName')?.touched">Last name is required.</div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group country-code-group">
            <label>Phone Number</label>
            <div class="phone-input-wrapper">
              <select formControlName="countryCode" class="glass-select">
                <option *ngFor="let cc of countryCodes" [value]="cc.code">{{cc.code}} ({{cc.name}})</option>
              </select>
              <input type="tel" formControlName="phoneNumber" class="glass-input phone-input" placeholder="Enter phone number">
            </div>
            <div class="error-text" *ngIf="supportForm.get('phoneNumber')?.invalid && supportForm.get('phoneNumber')?.touched">Valid phone number is required.</div>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" formControlName="email" class="glass-input" placeholder="Enter your email">
            <div class="error-text" *ngIf="supportForm.get('email')?.invalid && supportForm.get('email')?.touched">Valid email is required.</div>
          </div>
        </div>

        <div class="form-group">
          <label>What kind of help do you want from me?</label>
          <textarea formControlName="helpMessage" class="glass-textarea" rows="5" placeholder="Describe your project, ideas, or questions..."></textarea>
          <div class="error-text" *ngIf="supportForm.get('helpMessage')?.invalid && supportForm.get('helpMessage')?.touched">Message is required.</div>
        </div>

        <div *ngIf="submitMessage" class="alert" [ngClass]="{'alert-success': !isError, 'alert-error': isError}">
          {{ submitMessage }}
        </div>

        <div class="form-actions">
          <button type="button" class="btn-secondary" (click)="onClear()">Clear</button>
          <button type="submit" class="btn-primary" [disabled]="isSubmitting">
            {{ isSubmitting ? 'Submitting...' : 'Submit Request' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
