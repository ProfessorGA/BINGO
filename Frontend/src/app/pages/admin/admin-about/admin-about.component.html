<div class="admin-page-container">
  <h2>About Page Configuration</h2>
  <p class="text-secondary">Edit the header and description shown on your public About page.</p>

  <div *ngIf="!aboutContent" class="glass-panel about-card text-center">
    <p class="text-secondary">Loading About Content or Backend API is offline.</p>
  </div>

  <div class="glass-panel about-card" *ngIf="aboutContent">
    <div class="card-header">
      <h3>Current About Section</h3>
      <button class="btn-outline btn-small" (click)="openModal()">Edit</button>
    </div>
    <div class="info-group">
      <label>Header / Title</label>
      <div class="read-only-box header-text">{{ aboutContent.header || 'No Header Set' }}</div>
    </div>
    <div class="info-group">
      <label>Description Body</label>
      <div class="read-only-box">{{ aboutContent.description || 'No Description Set' }}</div>
    </div>
  </div>

  <div class="actions-area">
    <button class="btn-secondary add-btn" (click)="openModal()">+ Create New About Content</button>
  </div>

  <!-- Animated Modal Popup -->
  <div class="modal-overlay" *ngIf="isModalOpen" (click)="closeModal()">
    <div class="modal-content glass-panel" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Edit About Section</h3>
        <button class="close-btn" (click)="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Header Textarea</label>
          <textarea [(ngModel)]="newAbout.header" class="glass-textarea header-area" rows="2" placeholder="e.g., Hi, I am Alen Mathew Zachariah..."></textarea>
        </div>
        <div class="form-group">
          <label>Description Textarea</label>
          <textarea [(ngModel)]="newAbout.description" class="glass-textarea" rows="6" placeholder="Write your full biography here..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-outline" (click)="clearForm()">Clear</button>
        <button class="btn-primary" (click)="saveNewAbout()">Save Live</button>
      </div>
    </div>
  </div>
</div>
