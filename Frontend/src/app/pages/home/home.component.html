<div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
  <div class="w-100 animate-fade-in-up" style="max-width: 500px;">
    
    <!-- Logo / Heading -->
    <div class="text-center mb-4">
      <div class="d-inline-flex align-items-center justify-content-center bg-dark border border-secondary border-opacity-25 rounded-circle mb-3 shadow" style="width: 80px; height: 80px;">
        <i class="bi bi-grid-3x3-gap-fill text-primary" style="font-size: 2.5rem; filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.6));"></i>
      </div>
      <h1 class="fw-bold tracking-tight mb-0">
        <span class="gradient-text">BINGO</span>
      </h1>
      <p class="text-secondary small text-uppercase tracking-wider mb-2">Multiplayer Online Game</p>
    </div>

    <!-- Gamer Quote -->
    <div class="glass-card p-3 mb-4 text-center border-primary border-opacity-10 bg-primary bg-opacity-5 rounded-3 shadow-sm animate-fade-in-up">
      <p class="mb-0 text-secondary fst-italic small">
        <i class="bi bi-quote text-primary me-1 fs-5"></i>
        Grid your numbers, stay sharp, and let the BINGO battle begin! Ultimate victory awaits.
      </p>
    </div>

    <!-- Glass Main Card -->
    <div class="glass-card">
      <!-- Tabs -->
      <div class="d-flex p-1 bg-dark bg-opacity-50 rounded-3 mb-4 border border-white border-opacity-5">
        <button 
          class="btn flex-fill text-nowrap rounded-2 transition-all"
          [class.btn-glass-primary]="activeTab === 'create'"
          [class.text-secondary]="activeTab !== 'create'"
          [class.btn-dark]="activeTab !== 'create'"
          style="border: none;"
          (click)="setTab('create')">
          <i class="bi bi-plus-circle-fill me-2"></i>Create Room
        </button>
        <button 
          class="btn flex-fill text-nowrap rounded-2 transition-all"
          [class.btn-glass-primary]="activeTab === 'join'"
          [class.text-secondary]="activeTab !== 'join'"
          [class.btn-dark]="activeTab !== 'join'"
          style="border: none;"
          (click)="setTab('join')">
          <i class="bi bi-person-plus-fill me-2"></i>Join Room
        </button>
      </div>

      <!-- Error Alert -->
      <div *ngIf="errorMessage" class="alert alert-danger border-danger border-opacity-25 bg-danger bg-opacity-10 text-danger rounded-3 d-flex align-items-center mb-4" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-3 fs-5"></i>
        <div>{{ errorMessage }}</div>
      </div>

      <!-- Create Room Form -->
      <form *ngIf="activeTab === 'create'" (ngSubmit)="onCreateRoom()">
        <div class="mb-4">
          <label for="hostName" class="form-label text-secondary fw-semibold small mb-2">YOUR NAME</label>
          <div class="position-relative">
            <i class="bi bi-person-fill position-absolute top-50 start-0 translate-middle-y ms-3 text-secondary"></i>
            <input 
              type="text" 
              id="hostName" 
              name="hostName" 
              class="form-control form-glass-input ps-5" 
              placeholder="Enter your name" 
              [(ngModel)]="hostName" 
              required
              minlength="2"
              maxlength="20"
              autocomplete="off"
              [disabled]="isLoading">
          </div>
        </div>
        <button 
          type="submit" 
          class="btn btn-glass-primary w-100 py-3 d-flex align-items-center justify-content-center"
          [disabled]="isLoading || !hostName.trim()">
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          <i *ngIf="!isLoading" class="bi bi-play-fill me-2 fs-5"></i>
          {{ isLoading ? 'Creating Room...' : 'Create Room' }}
        </button>
      </form>

      <!-- Join Room Form -->
      <form *ngIf="activeTab === 'join'" (ngSubmit)="onJoinRoom()">
        <div class="mb-3">
          <label for="roomCode" class="form-label text-secondary fw-semibold small mb-2">ROOM CODE</label>
          <div class="position-relative">
            <i class="bi bi-key-fill position-absolute top-50 start-0 translate-middle-y ms-3 text-secondary"></i>
            <input 
              type="text" 
              id="roomCode" 
              name="roomCode" 
              class="form-control form-glass-input ps-5 text-uppercase" 
              placeholder="e.g. X4P9" 
              [(ngModel)]="roomCode" 
              required
              minlength="4"
              maxlength="4"
              autocomplete="off"
              [disabled]="isLoading">
          </div>
        </div>
        
        <div class="mb-4">
          <label for="playerName" class="form-label text-secondary fw-semibold small mb-2">YOUR NAME</label>
          <div class="position-relative">
            <i class="bi bi-person-fill position-absolute top-50 start-0 translate-middle-y ms-3 text-secondary"></i>
            <input 
              type="text" 
              id="playerName" 
              name="playerName" 
              class="form-control form-glass-input ps-5" 
              placeholder="Enter your name" 
              [(ngModel)]="playerName" 
              required
              minlength="2"
              maxlength="20"
              autocomplete="off"
              [disabled]="isLoading">
          </div>
        </div>

        <button 
          type="submit" 
          class="btn btn-glass-primary w-100 py-3 d-flex align-items-center justify-content-center"
          [disabled]="isLoading || !playerName.trim() || roomCode.trim().length !== 4">
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          <i *ngIf="!isLoading" class="bi bi-door-open-fill me-2"></i>
          {{ isLoading ? 'Joining Room...' : 'Join Room' }}
        </button>
      </form>
    </div>

    <!-- Quick Info & Footer -->
    <div class="text-center mt-4 d-flex flex-column gap-2">
      <p class="text-secondary small mb-0">
        <i class="bi bi-shield-lock-fill me-1 text-primary"></i> Real-time synchronization powered by ASP.NET Core SignalR
      </p>
      <div class="border-top border-white border-opacity-5 pt-3 mt-2">
        <p class="text-secondary small mb-1">
          Developed & Designed by <a href="https://alenmathewzachariah.vercel.app/" target="_blank" class="text-primary text-decoration-none fw-semibold">Alen Mathew Zachariah</a>
        </p>
        <p class="text-secondary opacity-50 small mb-0">
          &copy; 2026 BINGO Multiplayer. All rights reserved.
        </p>
      </div>
    </div>

  </div>
</div>
